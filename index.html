<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pink Case Filter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #1a0a10;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow.one { background: #ff4080; top: -100px; left: -100px; }
        .bg-glow.two { background: #ff6090; bottom: -100px; right: -100px; }

        header {
            text-align: center;
            padding: 30px 20px 16px;
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d, #ff4080, #ff9ecf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        header p {
            color: #cc8a9e;
            font-size: 0.9rem;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .upload-zone {
            border: 2px dashed #ff407066;
            border-radius: 20px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #ff40800a;
            margin-bottom: 20px;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #ff4080;
            background: #ff408018;
            transform: scale(1.01);
        }
        .upload-zone .icon { font-size: 3rem; margin-bottom: 12px; }
        .upload-zone .text { color: #cc8a9e; font-size: 0.95rem; }
        .upload-zone .text strong { color: #ff6b9d; }

        input[type="file"] { display: none; }

        .controls {
            background: #2a1019;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
            display: none;
            position: sticky;
            top: 8px;
            z-index: 5;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px #00000055;
        }
        .controls.visible { display: block; }

        .control-group {
            margin-bottom: 12px;
        }
        .control-group:last-child { margin-bottom: 0; }

        .control-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #cc8a9e;
            margin-bottom: 6px;
        }
        .control-group label span {
            color: #ff6b9d;
            font-weight: 600;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #3a1525;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff4080;
            cursor: pointer;
            box-shadow: 0 0 10px #ff408066;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        @media (min-width: 600px) {
            .photo-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .photo-tile {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 1;
            cursor: pointer;
        }
        .photo-tile canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .photo-tile .remove {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            background: #000a;
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
        }
        .photo-tile .remove:hover { opacity: 1; background: #ff4080; }

        .photo-tile .badge {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: #000a;
            color: #ff6b9d;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
        }
        .btn.visible { display: block; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, #ff4080, #ff6b9d);
            color: #fff;
            box-shadow: 0 4px 20px #ff408044;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px #ff408066;
        }

        .btn-secondary {
            background: #2a1019;
            color: #ff6b9d;
            border: 1px solid #ff407033;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #3a1525;
        }

        .status {
            text-align: center;
            color: #ff6b9d;
            font-size: 0.85rem;
            padding: 8px;
            display: none;
        }
        .status.visible { display: block; }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: #000e;
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .lightbox.visible { display: flex; }
        .lightbox img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="bg-glow one"></div>
    <div class="bg-glow two"></div>

    <header>
        <h1>El Pink Case</h1>
        <p>Filtro del case rosado para tus fotos</p>
    </header>

    <div class="container">
        <div class="upload-zone" id="uploadZone">
            <div class="icon">📸</div>
            <div class="text">Toca para subir fotos o <strong>arrastra aquí</strong><br><span style="font-size:0.8rem;opacity:0.7;">Puedes seleccionar varias a la vez</span></div>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple>

        <div class="controls" id="controls">
            <div class="control-group">
                <label>Intensidad del rosa <span id="tintVal">60%</span></label>
                <input type="range" id="tintIntensity" min="0" max="100" value="60">
            </div>
            <div class="control-group">
                <label>Cantidad de círculos <span id="circlesVal">14</span></label>
                <input type="range" id="circlesCount" min="0" max="30" value="14">
            </div>
            <div class="control-group">
                <label>Tamaño de círculos <span id="circleSizeVal">80%</span></label>
                <input type="range" id="circleSize" min="10" max="150" value="80">
            </div>
            <div class="control-group">
                <label>Opacidad de círculos <span id="circleOpacityVal">70%</span></label>
                <input type="range" id="circleOpacity" min="10" max="100" value="70">
            </div>
            <div class="control-group">
                <label>Light leak (bordes) <span id="leakVal">50%</span></label>
                <input type="range" id="lightLeak" min="0" max="100" value="50">
            </div>
            <div class="control-group">
                <label>Viñeta <span id="vignetteVal">40%</span></label>
                <input type="range" id="vignette" min="0" max="100" value="40">
            </div>
        </div>

        <div class="photo-grid" id="photoGrid"></div>

        <div class="status" id="status"></div>

        <div class="buttons">
            <button class="btn btn-secondary" id="btnAdd">+ Agregar fotos</button>
            <button class="btn btn-secondary" id="btnClear">Limpiar todo</button>
            <button class="btn btn-primary" id="btnDownload">Descargar todas</button>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <img id="lightboxImg" src="">
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const photos = []; // {id, image, circles, previewCanvas}
        let nextId = 1;

        // Upload handling
        $('uploadZone').addEventListener('click', () => $('fileInput').click());
        $('btnAdd').addEventListener('click', () => $('fileInput').click());
        $('fileInput').addEventListener('change', e => {
            if (e.target.files.length) addPhotos(Array.from(e.target.files));
            e.target.value = '';
        });

        // Drag & drop
        const zone = $('uploadZone');
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('dragover');
            if (e.dataTransfer.files.length) addPhotos(Array.from(e.dataTransfer.files));
        });

        function generateCirclePositions() {
            const positions = [];
            const count = 35;
            for (let i = 0; i < count; i++) {
                positions.push({
                    x: Math.random(),
                    y: Math.random(),
                    r: 0.06 + Math.random() * 0.18,
                    opacity: 0.3 + Math.random() * 0.5,
                    hue: Math.random() > 0.3 ? (340 + Math.random() * 30) : (10 + Math.random() * 20),
                    edge: Math.random(),
                    sat: 70 + Math.random() * 20
                });
            }
            for (let i = 0; i < count; i++) {
                if (positions[i].edge > 0.3) {
                    const side = Math.floor(Math.random() * 4);
                    if (side === 0) positions[i].x = Math.random() * 0.3;
                    else if (side === 1) positions[i].x = 0.7 + Math.random() * 0.3;
                    else if (side === 2) positions[i].y = Math.random() * 0.3;
                    else positions[i].y = 0.7 + Math.random() * 0.3;
                }
            }
            return positions;
        }

        function addPhotos(files) {
            const imageFiles = files.filter(f => f.type.startsWith('image/'));
            if (!imageFiles.length) return;

            let loaded = 0;
            imageFiles.forEach(file => {
                const img = new Image();
                img.onload = () => {
                    photos.push({
                        id: nextId++,
                        image: img,
                        name: file.name,
                        circles: generateCirclePositions(),
                        canvas: null
                    });
                    loaded++;
                    if (loaded === imageFiles.length) {
                        renderGrid();
                        showUI();
                    }
                };
                img.src = URL.createObjectURL(file);
            });
        }

        function showUI() {
            if (photos.length > 0) {
                $('controls').classList.add('visible');
                $('btnAdd').classList.add('visible');
                $('btnClear').classList.add('visible');
                $('btnDownload').classList.add('visible');
                $('uploadZone').style.display = 'none';
            }
        }

        function renderGrid() {
            const grid = $('photoGrid');
            grid.innerHTML = '';
            photos.forEach(photo => {
                const tile = document.createElement('div');
                tile.className = 'photo-tile';

                const canvas = document.createElement('canvas');
                photo.canvas = canvas;

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove';
                removeBtn.innerHTML = '&times;';
                removeBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    const idx = photos.findIndex(p => p.id === photo.id);
                    if (idx >= 0) photos.splice(idx, 1);
                    if (photos.length === 0) {
                        $('controls').classList.remove('visible');
                        $('btnAdd').classList.remove('visible');
                        $('btnClear').classList.remove('visible');
                        $('btnDownload').classList.remove('visible');
                        $('uploadZone').style.display = '';
                    }
                    renderGrid();
                });

                const badge = document.createElement('div');
                badge.className = 'badge';
                badge.textContent = '✨ pink';

                tile.appendChild(canvas);
                tile.appendChild(removeBtn);
                tile.appendChild(badge);

                tile.addEventListener('click', () => {
                    $('lightboxImg').src = canvas.toDataURL('image/jpeg', 0.9);
                    $('lightbox').classList.add('visible');
                });

                grid.appendChild(tile);
                renderPhoto(photo, true); // preview size
            });
        }

        function renderPhoto(photo, isPreview) {
            const img = photo.image;
            const canvas = photo.canvas;
            const ctx = canvas.getContext('2d');

            const maxDim = isPreview ? 600 : 1600;
            let w = img.naturalWidth;
            let h = img.naturalHeight;
            if (w > maxDim || h > maxDim) {
                const scale = maxDim / Math.max(w, h);
                w = Math.round(w * scale);
                h = Math.round(h * scale);
            }
            canvas.width = w;
            canvas.height = h;

            const tint = $('tintIntensity').value / 100;
            const numCircles = parseInt($('circlesCount').value);
            const circleScale = $('circleSize').value / 100;
            const circleOpac = $('circleOpacity').value / 100;
            const leak = $('lightLeak').value / 100;
            const vig = $('vignette').value / 100;

            ctx.drawImage(img, 0, 0, w, h);

            // Pink overlay
            ctx.globalCompositeOperation = 'multiply';
            const pinkGrad = ctx.createRadialGradient(w * 0.5, h * 0.5, 0, w * 0.5, h * 0.5, w * 0.7);
            pinkGrad.addColorStop(0, `rgba(255, 180, 200, ${tint * 0.3})`);
            pinkGrad.addColorStop(1, `rgba(220, 60, 80, ${tint * 0.5})`);
            ctx.fillStyle = pinkGrad;
            ctx.fillRect(0, 0, w, h);

            ctx.globalCompositeOperation = 'screen';
            ctx.fillStyle = `rgba(255, 60, 100, ${tint * 0.15})`;
            ctx.fillRect(0, 0, w, h);

            // Light leaks
            if (leak > 0) {
                ctx.globalCompositeOperation = 'screen';
                const leak1 = ctx.createRadialGradient(w * 0.85, h * 0.8, 0, w * 0.85, h * 0.8, w * 0.6);
                leak1.addColorStop(0, `rgba(255, 80, 100, ${leak * 0.4})`);
                leak1.addColorStop(0.5, `rgba(255, 40, 70, ${leak * 0.15})`);
                leak1.addColorStop(1, 'rgba(255, 40, 70, 0)');
                ctx.fillStyle = leak1;
                ctx.fillRect(0, 0, w, h);

                const leak2 = ctx.createRadialGradient(w * 0.1, h * 0.15, 0, w * 0.1, h * 0.15, w * 0.5);
                leak2.addColorStop(0, `rgba(255, 120, 150, ${leak * 0.25})`);
                leak2.addColorStop(0.6, `rgba(255, 60, 90, ${leak * 0.08})`);
                leak2.addColorStop(1, 'rgba(255, 60, 90, 0)');
                ctx.fillStyle = leak2;
                ctx.fillRect(0, 0, w, h);

                const leak3 = ctx.createRadialGradient(w * 0.6, h * 0.1, 0, w * 0.6, h * 0.1, w * 0.4);
                leak3.addColorStop(0, `rgba(255, 150, 170, ${leak * 0.2})`);
                leak3.addColorStop(1, 'rgba(255, 80, 100, 0)');
                ctx.fillStyle = leak3;
                ctx.fillRect(0, 0, w, h);
            }

            // Bokeh circles
            ctx.globalCompositeOperation = 'screen';
            for (let i = 0; i < numCircles && i < photo.circles.length; i++) {
                const c = photo.circles[i];
                const cx = c.x * w;
                const cy = c.y * h;
                const cr = c.r * Math.min(w, h) * circleScale;
                const op = c.opacity * circleOpac;

                const grad = ctx.createRadialGradient(cx, cy, cr * 0.1, cx, cy, cr);
                grad.addColorStop(0, `hsla(${c.hue}, ${c.sat}%, 80%, ${op * 0.9})`);
                grad.addColorStop(0.3, `hsla(${c.hue}, ${c.sat}%, 70%, ${op * 0.7})`);
                grad.addColorStop(0.6, `hsla(${c.hue}, ${c.sat}%, 60%, ${op * 0.35})`);
                grad.addColorStop(0.85, `hsla(${c.hue}, ${c.sat}%, 55%, ${op * 0.1})`);
                grad.addColorStop(1, `hsla(${c.hue}, ${c.sat}%, 50%, 0)`);

                ctx.beginPath();
                ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.strokeStyle = `hsla(${c.hue}, 60%, 75%, ${op * 0.5})`;
                ctx.lineWidth = Math.max(1.5, cr * 0.07);
                ctx.stroke();
            }

            // Vignette
            if (vig > 0) {
                ctx.globalCompositeOperation = 'multiply';
                const vigGrad = ctx.createRadialGradient(w / 2, h / 2, w * 0.25, w / 2, h / 2, w * 0.75);
                vigGrad.addColorStop(0, 'rgba(255, 255, 255, 1)');
                vigGrad.addColorStop(0.5, `rgba(80, 20, 40, ${vig * 0.3})`);
                vigGrad.addColorStop(1, `rgba(30, 5, 15, ${vig * 0.7})`);
                ctx.fillStyle = vigGrad;
                ctx.fillRect(0, 0, w, h);
            }

            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = `rgba(255, 100, 120, ${tint * 0.08})`;
            ctx.fillRect(0, 0, w, h);

            ctx.globalCompositeOperation = 'source-over';
        }

        function renderAllPreviews() {
            photos.forEach(p => renderPhoto(p, true));
        }

        // Slider events - apply to all
        let renderTimeout;
        ['tintIntensity', 'circlesCount', 'circleSize', 'circleOpacity', 'lightLeak', 'vignette'].forEach(id => {
            $(id).addEventListener('input', () => {
                $('tintVal').textContent = $('tintIntensity').value + '%';
                $('circlesVal').textContent = $('circlesCount').value;
                $('circleSizeVal').textContent = $('circleSize').value + '%';
                $('circleOpacityVal').textContent = $('circleOpacity').value + '%';
                $('leakVal').textContent = $('lightLeak').value + '%';
                $('vignetteVal').textContent = $('vignette').value + '%';
                clearTimeout(renderTimeout);
                renderTimeout = setTimeout(renderAllPreviews, 30);
            });
        });

        // Download all as ZIP
        $('btnDownload').addEventListener('click', async () => {
            if (!photos.length) return;
            const btn = $('btnDownload');
            const status = $('status');
            btn.disabled = true;
            status.classList.add('visible');

            try {
                if (photos.length === 1) {
                    // Single download
                    status.textContent = 'Generando foto en alta resolución...';
                    const photo = photos[0];
                    renderPhoto(photo, false);
                    await new Promise(resolve => {
                        photo.canvas.toBlob(blob => {
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'pinkcase_' + Date.now() + '.jpg';
                            a.click();
                            URL.revokeObjectURL(url);
                            resolve();
                        }, 'image/jpeg', 0.92);
                    });
                    renderPhoto(photo, true);
                } else {
                    // Multiple - bundle in ZIP
                    const zip = new JSZip();
                    const folder = zip.folder('pink_case_' + Date.now());

                    for (let i = 0; i < photos.length; i++) {
                        const photo = photos[i];
                        status.textContent = `Procesando foto ${i + 1} de ${photos.length}...`;
                        renderPhoto(photo, false);
                        const blob = await new Promise(r => photo.canvas.toBlob(r, 'image/jpeg', 0.92));
                        folder.file(`pinkcase_${String(i + 1).padStart(2, '0')}.jpg`, blob);
                        renderPhoto(photo, true);
                        await new Promise(r => setTimeout(r, 0));
                    }

                    status.textContent = 'Comprimiendo ZIP...';
                    const content = await zip.generateAsync({ type: 'blob' });
                    const url = URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'pink_case_' + Date.now() + '.zip';
                    a.click();
                    URL.revokeObjectURL(url);
                }

                status.textContent = '¡Listo! ✨';
                setTimeout(() => status.classList.remove('visible'), 2000);
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
            } finally {
                btn.disabled = false;
            }
        });

        // Clear all
        $('btnClear').addEventListener('click', () => {
            if (!confirm('¿Quitar todas las fotos?')) return;
            photos.length = 0;
            renderGrid();
            $('controls').classList.remove('visible');
            $('btnAdd').classList.remove('visible');
            $('btnClear').classList.remove('visible');
            $('btnDownload').classList.remove('visible');
            $('uploadZone').style.display = '';
        });

        // Lightbox
        $('lightboxClose').addEventListener('click', () => $('lightbox').classList.remove('visible'));
        $('lightbox').addEventListener('click', e => {
            if (e.target === $('lightbox')) $('lightbox').classList.remove('visible');
        });
    </script>
</body>
</html>
